# Shared GPU env on lab machines (micromamba binary: bin/micromamba).
#
# Create / refresh:
#   bin/micromamba create -p "$(pwd)/bin/env/comp0197_g33" -f env_comp0197_g33.yml -y
#   bin/micromamba install -p "$(pwd)/bin/env/comp0197_g33" -f env_comp0197_g33.yml -y
#
# Whisper LoRA training needs soundfile + peft (pip section below). If micromamba
# skips pip deps, run:  bin/env/comp0197_g33/bin/python -m pip install soundfile peft
#
name: comp0197-pt-g33-submission
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - matplotlib
  - pandas
  - numpy
  - scikit-learn
  - ipykernel
  - ipywidgets
  - pillow
  - pytorch::pytorch
  - pytorch::torchaudio
  # - pytorch::pytorch-cuda=12.1
  - transformers
  # TODO remove - openai-whisper
  # BIG NO NO - ffmpeg
  - pip
  - pip:
    - soundfile
    - peft

# Ideal State:
#   - Peft, Transformers (assume Whisper is available in Transformers) installed via micromamba pip deps section above.
#   - soundfile loads audio; torchaudio.functional.resample handles resampling to 16kHz (no librosa or ffmpeg needed).